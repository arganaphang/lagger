# Minimal single-binary Loki config for local learning use.
# Full reference: https://grafana.com/docs/loki/latest/configure/
#
# Loki stores and indexes logs. Alloy receives OTLP logs from your apps, converts
# them to the Loki write format, and pushes them here.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

limits_config:
  # Powers the "Logs volume" view in Grafana's Explore tab.
  volume_enabled: true

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Disable anonymous usage stats reporting to Grafana Labs.
analytics:
  reporting_enabled: false
